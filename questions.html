<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Questions for Leader</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="page-header">
    <div>
      <p class="eyebrow">Enterprise Services Leaders</p>
      <h1 id="page-title">Questions for Leader</h1>
      <p class="subtitle">Questions that the leader needs to answer.</p>
    </div>
    <a class="secondary-button" href="summary.html">Back to Summary</a>
  </header>

  <section class="selected-panel">
    <div class="profile-card questions-layout">
      <div class="leader-info">
        <h2 id="leader-name">Leader Name</h2>
        <p id="leader-dept">Department</p>
      </div>
      <img id="leader-image" alt="Leader image" class="leader-profile-image">
    </div>

    <div class="questions-section">
      <h3>Questions (That leader needs to answer):</h3>
      <ol id="questions-list" class="numbered-questions"></ol>
    </div>
  </section>

  <script type="module" src="questions.js"></script>
</body>
</html>
